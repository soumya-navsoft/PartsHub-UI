<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Admin — Garages</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="admin" data-page="garages" data-page-title="Garages">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="page-card">
        <div class="page-card__toolbar">
          <div class="search"><span id="si"></span><input placeholder="Search garages, license, emirate..."/></div>
          <div style="margin-left:auto" class="flex gap-8">
            <select class="select" style="width:auto"><option>All Emirates</option><option>Dubai</option><option>Abu Dhabi</option><option>Sharjah</option><option>Al Ain</option></select>
            <select class="select" style="width:auto"><option>All Plans</option><option>Starter</option><option>Pro</option><option>Business</option></select>
            <button class="btn btn--primary"><span id="pi"></span> Onboard Garage</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="t">
            <thead><tr><th class="check"><input type="checkbox" class="cbx"/></th><th>Garage</th><th>License No.</th><th>Emirate</th><th>Branches</th><th>Plan</th><th>Rating</th><th>Claims (30d)</th><th>Revenue (AED)</th><th>Status</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>10</option></select> of 486</div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">…</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  document.getElementById('pi').innerHTML = PHIcon('plus', 14);
  const ROWS = [
    ['Royal Swiss Automobile','CN-12349P','Dubai',3,'Pro',4.9,42,184000,['Active','badge--ok']],
    ['Craft Auto Services','CN-12421A','Dubai',1,'Pro',4.7,28,98400,['Active','badge--ok']],
    ['Gargash Auto Centre','CN-04839S','Abu Dhabi',5,'Business',4.5,86,420000,['Active','badge--ok']],
    ['Speedway Motors','CN-29382L','Sharjah',2,'Starter',4.2,18,42000,['Suspended','badge--danger']],
    ['Al Habtoor Motors','CN-19283R','Dubai',4,'Business',4.8,64,310000,['Active','badge--ok']],
    ['Bin Hamoodah Garage','CN-83920T','Abu Dhabi',2,'Pro',4.4,32,128000,['Active','badge--ok']],
    ['Al Wasl Auto Garage','CN-50293L','Dubai',1,'Starter',4.0,8,18000,['Pending KYC','badge--warn']],
    ['Sharjah Mechanic Hub','CN-71029K','Sharjah',1,'Starter',4.3,12,24000,['Active','badge--ok']],
    ['Falcon Garage Network','CN-90120E','Dubai',6,'Business',4.6,98,560000,['Active','badge--ok']],
    ['Al Ain Auto Centre','CN-30201D','Al Ain',1,'Pro',4.1,14,32000,['Active','badge--ok']]
  ];
  const star = r => '★★★★★'.slice(0, Math.round(r)) + '☆☆☆☆☆'.slice(0, 5 - Math.round(r));
  document.querySelector('#t tbody').innerHTML = ROWS.map(r => `
    <tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><span class="avatar-sm"></span><strong>${r[0]}</strong></td>
      <td class="muted">${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td><span class="badge badge--info">${r[4]}</span></td>
      <td><span style="color:var(--accent-blue);letter-spacing:2px">${star(r[5])}</span> ${r[5]}</td>
      <td>${r[6]}</td>
      <td><strong>${r[7].toLocaleString()}</strong></td>
      <td><span class="badge ${r[8][1]}">${r[8][0]}</span></td>
    </tr>
  `).join('');
</script>
</body>
</html>
