<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Supplier — Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="supplier" data-page="orders" data-page-title="Orders">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="page-card">
        <div class="tabs" style="padding:0 16px">
          <div class="tab is-active">All</div>
          <div class="tab">To Confirm <span class="badge" style="margin-left:6px">8</span></div>
          <div class="tab">To Ship <span class="badge" style="margin-left:6px">23</span></div>
          <div class="tab">In Transit</div>
          <div class="tab">Delivered</div>
        </div>
        <div class="page-card__toolbar" style="border-top:1px solid var(--ink-100)">
          <div class="search"><span id="si"></span><input placeholder="Search orders..."/></div>
          <div style="margin-left:auto" class="flex gap-8">
            <button class="btn">Export</button>
            <button class="btn btn--primary">Print labels</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="t">
            <thead>
              <tr><th class="check"><input type="checkbox" class="cbx"/></th><th>Order ID</th><th>Garage</th><th>Items</th><th>Total (AED)</th><th>Payment</th><th>Ship by</th><th>Carrier</th><th>Status</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>10</option></select></div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  const GAR = ['Royal Swiss Automobile','Craft Auto Services','Gargash Auto Centre','Speedway Motors','Al Habtoor Motors','Bin Hamoodah Garage'];
  const STAT = [['To Ship','badge--warn'],['In Transit','badge--info'],['Delivered','badge--ok'],['To Confirm','badge']];
  let html='';
  const STATUS_KEY = ['toship','transit','delivered','confirm'];
  for (let i=0;i<10;i++) {
    const s = STAT[i%STAT.length];
    const sk = STATUS_KEY[i%STAT.length];
    const po = `SO-${5200+i}`;
    const gar = GAR[i%GAR.length];
    const href = `order-detail.html?po=${encodeURIComponent(po)}&garage=${encodeURIComponent(gar)}&status=${sk}`;
    html+=`<tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><a class="id-link" href="${href}">${po}</a></td>
      <td>${gar}</td>
      <td>${3 + (i%5)} items</td>
      <td><strong>${(2800 + i*420).toLocaleString()}</strong></td>
      <td><span class="badge badge--ok">Paid</span></td>
      <td>${(22+i).toString().padStart(2,'0')}/01/2025</td>
      <td>${i%2 ? 'Aramex' : 'DHL'}</td>
      <td><span class="badge ${s[1]}">${s[0]}</span></td>
      <td class="more">${PHIcon('dot3', 18)}</td>
    </tr>`;
  }
  document.querySelector('#t tbody').innerHTML = html;
</script>
</body>
</html>
