<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Supplier — RFQs Received</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="supplier" data-page="rfqs" data-page-title="RFQs Received">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="page-card">
        <div class="tabs" style="padding:0 16px">
          <div class="tab is-active">All <span class="badge" style="margin-left:6px">28</span></div>
          <div class="tab">Open <span class="badge" style="margin-left:6px">7</span></div>
          <div class="tab">Quoted <span class="badge" style="margin-left:6px">14</span></div>
          <div class="tab">Won <span class="badge" style="margin-left:6px">5</span></div>
          <div class="tab">Lost <span class="badge" style="margin-left:6px">2</span></div>
        </div>
        <div class="page-card__toolbar" style="border-top:1px solid var(--ink-100)">
          <div class="search"><span id="si"></span><input placeholder="Search RFQ ID, garage, part..." /></div>
          <div style="margin-left:auto" class="flex gap-8">
            <button class="btn"><span id="fi"></span> Filter</button>
            <button class="btn">Export</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="t">
            <thead>
              <tr>
                <th class="check"><input type="checkbox" class="cbx"/></th>
                <th>RFQ ID</th>
                <th>From Garage</th>
                <th>Parts requested</th>
                <th>Qty</th>
                <th>Budget (AED)</th>
                <th>Deadline</th>
                <th>Status</th>
                <th>Action</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>10</option></select> of 28</div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  document.getElementById('fi').innerHTML = PHIcon('filter', 14);
  const GAR = ['Royal Swiss Automobile','Craft Auto Services','Gargash Auto Centre','Speedway Motors','Al Habtoor Motors','Bin Hamoodah Garage'];
  const PARTS = ['Shock absorbers, Brake pad set','Transmission rebuild kit','Headlamp LH, Battery','Radiator hose, Front axle','Alternator OEM','Brake calipers, Brake discs','Coolant, Oil filter','Timing belt kit','Suspension arm LH'];
  const STAT = [['Open','badge--ok','Quote now','btn--primary'],['Quoted','badge--info','View quote','btn'],['Won','badge--ok','Fulfill order','btn--primary'],['Lost','badge--danger','View details','btn'],['Closed','badge','View details','btn']];
  let html='';
  for (let i=0;i<10;i++) {
    const s = STAT[i%STAT.length];
    html+=`<tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><a class="id-link" href="#">EFHG12${34+i}U</a></td>
      <td>${GAR[i%GAR.length]}</td>
      <td>${PARTS[i%PARTS.length]}</td>
      <td>${2 + (i%6)}</td>
      <td><strong>${(2400 + i*180).toLocaleString()}</strong></td>
      <td>${(20+i).toString().padStart(2,'0')}/01/2025</td>
      <td><span class="badge ${s[1]}">${s[0]}</span></td>
      <td><button class="btn ${s[3]} btn--sm">${s[2]}</button></td>
      <td class="more">${PHIcon('dot3', 18)}</td>
    </tr>`;
  }
  document.querySelector('#t tbody').innerHTML = html;
</script>
</body>
</html>
