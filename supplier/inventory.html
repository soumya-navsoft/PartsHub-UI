<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Supplier — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="supplier" data-page="inventory" data-page-title="Inventory">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="kpi-grid mb-16">
        <div class="kpi"><div class="kpi__icon" id="i1"></div><div><div class="kpi__label">Catalog SKUs</div><div class="kpi__value">8,420</div></div></div>
        <div class="kpi"><div class="kpi__icon blue" id="i2"></div><div><div class="kpi__label">Warehouses</div><div class="kpi__value">4</div></div></div>
        <div class="kpi"><div class="kpi__icon" id="i3" style="background:var(--warn-bg);color:var(--warn-fg)"></div><div><div class="kpi__label">Low Stock</div><div class="kpi__value">182</div></div></div>
        <div class="kpi"><div class="kpi__icon" id="i4" style="background:var(--danger-bg);color:var(--danger-fg)"></div><div><div class="kpi__label">Out of Stock</div><div class="kpi__value">64</div></div></div>
      </div>
      <div class="page-card">
        <div class="page-card__toolbar">
          <div class="search"><span id="si"></span><input placeholder="Search SKU, part name..."/></div>
          <div style="margin-left:auto" class="flex gap-8">
            <select class="select" style="width:auto"><option>All Warehouses</option><option>Jebel Ali</option><option>Mussafah</option><option>Sharjah Industrial</option></select>
            <button class="btn"><span id="ui"></span> Import</button>
            <a class="btn btn--primary" href="inventory-add.html"><span id="pi"></span> Add SKU</a>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="t">
            <thead>
              <tr><th class="check"><input type="checkbox" class="cbx"/></th><th>SKU</th><th>Part</th><th>Brand</th><th>Category</th><th>Warehouse</th><th>On hand</th><th>Reserved</th><th>Available</th><th>Status</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>10</option></select> of 8,420</div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">…</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  document.getElementById('ui').innerHTML = PHIcon('upload', 14);
  document.getElementById('pi').innerHTML = PHIcon('plus', 14);
  ['i1','i2','i3','i4'].forEach((id,i)=>document.getElementById(id).innerHTML = PHIcon(['package','venue','info','x'][i],22));
  const ROWS = [
    ['BR-FP-2025','Front Brake Pad Set','Brembo','Braking','Jebel Ali',420,32,388],
    ['SH-AB-118','Premium Shock Absorber','Bilstein','Suspension','Jebel Ali',128,18,110],
    ['HD-LP-LH-04','Headlamp Assembly LH','Hella','Lighting','Mussafah',64,12,52],
    ['BT-100-AGM','Battery 100Ah AGM','Bosch','Electrical','Sharjah Ind.',210,40,170],
    ['RD-HS-220','Radiator Hose Set','OEM','Cooling','Jebel Ali',360,15,345],
    ['AL-OEM-14','OEM Alternator','Denso','Electrical','Mussafah',24,8,16],
    ['BR-DC-2025','Brake Disc Combo','Brembo','Braking','Jebel Ali',86,24,62],
    ['AX-FR-04','Front Axle Bearing','SKF','Drivetrain','Sharjah Ind.',18,4,14],
    ['EX-MN-12','Exhaust Manifold','OEM','Engine','Mussafah',4,4,0],
    ['SP-PL-04','Spark Plug Set','NGK','Engine','Jebel Ali',0,0,0]
  ];
  const stat = a => a===0 ? '<span class="badge badge--danger">Out</span>' : a<25 ? '<span class="badge badge--warn">Low</span>' : '<span class="badge badge--ok">OK</span>';
  document.querySelector('#t tbody').innerHTML = ROWS.map(r=>`
    <tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><strong>${r[0]}</strong></td>
      <td><span class="thumb"></span>${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td class="muted">${r[4]}</td>
      <td>${r[5]}</td>
      <td>${r[6]}</td>
      <td><strong>${r[7]}</strong></td>
      <td>${stat(r[7])}</td>
    </tr>
  `).join('');
</script>
</body>
</html>
