<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Garage — Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="garage" data-page="orders" data-page-title="Orders">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="page-card">
        <div class="tabs" style="padding: 0 16px;">
          <div class="tab is-active">All Orders</div>
          <div class="tab">Confirmed</div>
          <div class="tab">In Transit</div>
          <div class="tab">Delivered</div>
          <div class="tab">Cancelled</div>
        </div>
        <div class="page-card__toolbar" style="border-top:1px solid var(--ink-100)">
          <div class="search"><span id="si"></span><input placeholder="Search orders..."/></div>
          <div style="margin-left:auto" class="flex gap-8">
            <button class="btn"><span id="di"></span> Export</button>
            <button class="btn btn--primary"><span id="pi"></span> New Order</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="ordTable">
            <thead>
              <tr>
                <th class="check"><input type="checkbox" class="cbx"/></th>
                <th>Order ID</th>
                <th>Supplier</th>
                <th>Items</th>
                <th>Total (AED)</th>
                <th>Payment</th>
                <th>Delivery</th>
                <th>Status</th>
                <th>Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>10</option></select> of 248</div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">…</button>
            <button class="pager__btn">25</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  document.getElementById('di').innerHTML = PHIcon('download', 14);
  document.getElementById('pi').innerHTML = PHIcon('plus', 14);

  const SUPS = ['Gulf Auto Parts LLC','Emirates Spare Co.','Al Habtoor Motors Parts','Bin Hamoodah Trading','Speedway Components','Royal Parts Supply'];
  const STAT = [['Delivered','badge--ok'],['In Transit','badge--info'],['Confirmed','badge--warn'],['Cancelled','badge--danger']];
  let html = '';
  for (let i=0; i<10; i++) {
    const s = STAT[i%STAT.length];
    html += `<tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><a class="id-link" href="#">ORD-${4500+i}</a></td>
      <td>${SUPS[i%SUPS.length]}</td>
      <td>${3 + (i%5)} items</td>
      <td><strong>${(2400 + i*340).toLocaleString()}</strong></td>
      <td><span class="badge badge--ok">Paid</span></td>
      <td>${i%3===0 ? 'Express' : 'Standard'}</td>
      <td><span class="badge ${s[1]}">${s[0]}</span></td>
      <td>${(10+i).toString().padStart(2,'0')}/01/2025</td>
      <td class="more">${PHIcon('dot3', 18)}</td>
    </tr>`;
  }
  document.querySelector('#ordTable tbody').innerHTML = html;
</script>
</body>
</html>
