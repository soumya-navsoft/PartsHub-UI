<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Garage — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="garage" data-page="inventory" data-page-title="Inventory">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">

      <div class="kpi-grid mb-16">
        <div class="kpi"><div class="kpi__icon" id="i1"></div><div><div class="kpi__label">Total SKUs</div><div class="kpi__value">1,328</div></div></div>
        <div class="kpi"><div class="kpi__icon blue" id="i2"></div><div><div class="kpi__label">In Stock</div><div class="kpi__value">1,193</div></div></div>
        <div class="kpi"><div class="kpi__icon" id="i3" style="background:var(--warn-bg);color:var(--warn-fg)"></div><div><div class="kpi__label">Low Stock</div><div class="kpi__value">96</div></div></div>
        <div class="kpi"><div class="kpi__icon" id="i4" style="background:var(--danger-bg);color:var(--danger-fg)"></div><div><div class="kpi__label">Out of Stock</div><div class="kpi__value">39</div></div></div>
      </div>

      <div class="page-card">
        <div class="page-card__toolbar">
          <div class="search"><span id="si"></span><input placeholder="Search part name, SKU..."/></div>
          <div style="margin-left:auto" class="flex gap-8">
            <button class="btn"><span id="ui"></span> Import CSV</button>
            <button class="btn"><span id="di"></span> Export</button>
            <a class="btn btn--primary" href="inventory-add.html"><span id="pi"></span> Add Part</a>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="invTable">
            <thead>
              <tr>
                <th class="check"><input type="checkbox" class="cbx"/></th>
                <th>SKU</th>
                <th>Part Name</th>
                <th>Category</th>
                <th>Brand</th>
                <th>Vehicle Fit</th>
                <th>Unit Cost</th>
                <th>Sell Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>10</option></select> of 1,328</div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">…</button>
            <button class="pager__btn">133</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  document.getElementById('ui').innerHTML = PHIcon('upload', 14);
  document.getElementById('di').innerHTML = PHIcon('download', 14);
  document.getElementById('pi').innerHTML = PHIcon('plus', 14);
  ['i1','i2','i3','i4'].forEach((id, i) => {
    document.getElementById(id).innerHTML = PHIcon(['package','inventory','info','x'][i], 22);
  });

  const PARTS = [
    ['BR-FP-2025','Front Brake Pad Combo Set','Braking','OEM-X','Toyota Camry 2018-2024',120,180,72],
    ['SH-AB-118','Premium Shock Absorber','Suspension','Bilstein','Honda Accord 2020+',280,420,34],
    ['HD-LP-LH-04','Headlamp Assembly LH','Lighting','Hella','BMW 5-Series F10',420,680,21],
    ['BT-100-AGM','Battery 100Ah AGM','Electrical','Bosch','Universal',360,590,48],
    ['RD-HS-220','Radiator Hose Set','Cooling','OEM','Audi A6 C7',60,120,60],
    ['AL-OEM-14','OEM Alternator 14V','Electrical','Denso','Lexus ES350',520,840,12],
    ['BR-DC-2025','Brake Disc Combo Set','Braking','Brembo','Mercedes E-Class W213',240,410,30],
    ['AX-FR-04','Front Axle Bearing','Drivetrain','SKF','Nissan Patrol Y62',110,190,18],
    ['EX-MN-12','Exhaust Manifold','Engine','OEM','Range Rover L405',780,1200,4],
    ['SP-PL-04','Spark Plug Set (4)','Engine','NGK','Universal Toyota',45,72,0]
  ];
  const stockBadge = s => s === 0 ? '<span class="badge badge--danger">Out of stock</span>' : s < 20 ? '<span class="badge badge--warn">Low</span>' : '<span class="badge badge--ok">In stock</span>';
  document.querySelector('#invTable tbody').innerHTML = PARTS.map(p => `
    <tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><strong>${p[0]}</strong></td>
      <td><span class="thumb"></span>${p[1]}</td>
      <td>${p[2]}</td>
      <td>${p[3]}</td>
      <td class="muted small">${p[4]}</td>
      <td>AED ${p[5]}</td>
      <td><strong>AED ${p[6]}</strong></td>
      <td>${p[7]}</td>
      <td>${stockBadge(p[7])}</td>
      <td class="more">${PHIcon('dot3', 18)}</td>
    </tr>
  `).join('');
</script>
</body>
</html>
