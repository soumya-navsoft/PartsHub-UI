<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub — Garage Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
<style>
  .auth__bg.garage {
    background:
      radial-gradient(ellipse at 35% 70%, rgba(255,255,255,0.06), transparent 60%),
      linear-gradient(135deg, #2d2520 0%, #1a1614 60%, #0a0807 100%);
  }
  /* subtle car silhouette */
  .car-art {
    position: absolute; left: 4%; top: 50%; transform: translateY(-50%);
    width: 55%; height: 60%;
    opacity: 0.85;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="auth">
  <div class="auth__bg garage"></div>
  <svg class="car-art" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="carBody" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#7a6450"/>
        <stop offset="50%" stop-color="#5b4a3a"/>
        <stop offset="100%" stop-color="#3a2e23"/>
      </linearGradient>
      <radialGradient id="wheelG" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#222"/>
        <stop offset="70%" stop-color="#111"/>
        <stop offset="100%" stop-color="#000"/>
      </radialGradient>
    </defs>
    <!-- ground shadow -->
    <ellipse cx="400" cy="345" rx="320" ry="18" fill="#000" opacity="0.45"/>
    <!-- body -->
    <path d="M80,290 Q90,200 220,170 L320,160 Q420,90 540,120 Q660,150 700,200 L740,220 Q760,240 750,280 L740,310 Q720,330 690,330 L130,330 Q90,330 80,310 Z" fill="url(#carBody)"/>
    <!-- windows -->
    <path d="M260,170 Q360,110 510,135 Q580,150 600,190 L600,210 L260,210 Z" fill="#1a1a1a" opacity="0.85"/>
    <path d="M275,180 Q360,128 470,140 L470,205 L275,205 Z" fill="#3a3530" opacity="0.6"/>
    <!-- grill -->
    <rect x="650" y="220" width="60" height="50" rx="4" fill="#0e0c0a"/>
    <g stroke="#c0a98c" stroke-width="1.5" opacity="0.7">
      <line x1="655" y1="228" x2="705" y2="228"/>
      <line x1="655" y1="238" x2="705" y2="238"/>
      <line x1="655" y1="248" x2="705" y2="248"/>
      <line x1="655" y1="258" x2="705" y2="258"/>
    </g>
    <!-- headlight -->
    <ellipse cx="715" cy="215" rx="22" ry="10" fill="#f5e6c8" opacity="0.5"/>
    <!-- wheels -->
    <circle cx="240" cy="320" r="55" fill="url(#wheelG)"/>
    <circle cx="240" cy="320" r="32" fill="#2c2a28"/>
    <circle cx="240" cy="320" r="6" fill="#888"/>
    <g stroke="#999" stroke-width="3" opacity="0.85">
      <line x1="240" y1="294" x2="240" y2="346"/>
      <line x1="214" y1="320" x2="266" y2="320"/>
      <line x1="222" y1="302" x2="258" y2="338"/>
      <line x1="258" y1="302" x2="222" y2="338"/>
    </g>
    <circle cx="600" cy="320" r="55" fill="url(#wheelG)"/>
    <circle cx="600" cy="320" r="32" fill="#2c2a28"/>
    <circle cx="600" cy="320" r="6" fill="#888"/>
    <g stroke="#999" stroke-width="3" opacity="0.85">
      <line x1="600" y1="294" x2="600" y2="346"/>
      <line x1="574" y1="320" x2="626" y2="320"/>
      <line x1="582" y1="302" x2="618" y2="338"/>
      <line x1="618" y1="302" x2="582" y2="338"/>
    </g>
    <!-- door handle -->
    <rect x="380" y="220" width="40" height="4" rx="2" fill="#1a1a1a"/>
  </svg>

  <div class="auth__wrap" style="justify-items:end;padding-right:8%;">
    <div class="auth__card">
      <div class="auth__brand">
        <img src="../shared/main-logo.png" style="width:100px;height:auto"/>
      </div>
      <h2 class="auth__title">Log in as Garage</h2>
      <form onsubmit="event.preventDefault(); window.location='dashboard.html';">
        <div class="field">
          <input type="email" placeholder="Email Address*" required />
        </div>
        <div class="field field--icon">
          <input type="password" placeholder="Password*" required />
          <span class="toggle-eye" id="eye"></span>
        </div>
        <div class="row-between">
          <label class="checkrow"><input type="checkbox" class="cbx"/> Remember me</label>
          <a class="auth__link" href="forgot-password.html">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn--primary btn--block btn--lg">Log In</button>
        <div class="auth__signup">New to Parts Hub? <a class="auth__link" href="register.html">Create account</a></div>
      </form>
    </div>
  </div>
</div>
<script src="../shared/icons.js"></script>
<script>
  document.getElementById('eye').innerHTML = PHIcon('eyeOff', 18);
</script>
</body>
</html>
