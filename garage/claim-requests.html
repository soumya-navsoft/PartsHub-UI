<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Garage — Claim Requests</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="garage" data-page="claim-request" data-subpage="claim-requests" data-page-title="Claim Requests">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="page-card">
        <div class="page-card__toolbar">
          <div class="search">
            <span id="searchIcon"></span>
            <input placeholder="Search..." />
          </div>
          <div style="margin-left:auto" class="flex gap-8">
            <button class="icon-btn" title="Stats" id="btnBars" style="border-color:var(--info-fg);color:var(--info-fg)"></button>
            <button class="icon-btn" title="Filter" id="btnFilter" style="border-color:var(--info-fg);color:var(--info-fg)"></button>
            <a class="btn btn--primary" href="claim-create.html"><span id="btnPlus"></span> Add Claim</a>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="claimsTable">
            <thead>
              <tr>
                <th class="check"><input type="checkbox" class="cbx"/></th>
                <th class="row-num">#</th>
                <th>Claim ID</th>
                <th>Policy Number</th>
                <th>Policy Holder Name</th>
                <th>Item Name</th>
                <th>Claim Status</th>
                <th>Contact No.</th>
                <th>Accident Date &amp; Time</th>
                <th>Accident Location <span style="opacity:0.5">↑</span></th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>13</option><option>25</option><option>50</option></select></div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">4</button>
            <button class="pager__btn">5</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('searchIcon').innerHTML = PHIcon('search', 14);
  document.getElementById('btnBars').innerHTML = PHIcon('bars', 16);
  document.getElementById('btnFilter').innerHTML = PHIcon('filter', 16);
  document.getElementById('btnPlus').innerHTML = PHIcon('plus', 14);

  const STATUSES = [
    { key: 'Submitted', cls: 'badge--ok' },
    { key: 'Pending', cls: 'badge--warn' },
    { key: 'Quoted', cls: 'badge--info' },
    { key: 'Rejected', cls: 'badge--danger' }
  ];
  const NAMES = ['Sulaiman Al-Zayoudi','Yasmeen Al-Ghafli','Omar Al-Mansouri','Aisha Al-Hashimi','Mohammed Al-Falasi','Fatima Al-Suwaidi','Khalid Al-Nuaimi','Mariam Al-Maktoum'];
  const ITEMS = ['Premium Viewlite Original Rear Brake Disc Pad','Shock Absorber — Front LH','Transmission Rebuild Kit','Headlamp Assembly LH','AGM Battery 100Ah','Radiator Hose Set','Front Axle Bearing','OEM Alternator 14V/180A'];
  const LOCS = ['Abu Dhabi','Dubai','Sharjah','Ras Al Khaimah','Ajman','Al Ain','Fujairah'];
  const POLICIES = ['89KLMN6789P1Q2R3','67WXYZ2345A6B7C8','12ABCD0987EFGH54','55QRST6677UVWX22'];
  const PHONES = ['+971 555-345-678','+971 555-321-098','+971 555-119-447','+971 555-902-001'];

  const rnd = a => a[Math.floor(Math.random()*a.length)];
  let html = '';
  for (let i = 1; i <= 13; i++) {
    const s = STATUSES[i % STATUSES.length];
    const date = (10 + (i % 18)).toString().padStart(2,'0') + '/01/2025, ' + (i%2 ? '03:15 PM' : '04:30 AM');
    html += `<tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td class="row-num">${i}</td>
      <td><a class="id-link" href="#">JKLMN567${80+i}</a></td>
      <td>${rnd(POLICIES)}</td>
      <td>${rnd(NAMES)}</td>
      <td><span class="thumb"></span>${rnd(ITEMS)}</td>
      <td><span class="badge ${s.cls}">${s.key}</span></td>
      <td>${rnd(PHONES)}</td>
      <td>${date}</td>
      <td>${rnd(LOCS)}</td>
      <td class="more">${PHIcon('dot3', 18)}</td>
    </tr>`;
  }
  document.querySelector('#claimsTable tbody').innerHTML = html;
</script>
</body>
</html>
