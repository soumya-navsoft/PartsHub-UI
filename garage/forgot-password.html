<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>PartsHub Garage — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/styles.css"/></head>
<body>
<div class="auth">
  <div class="auth__bg" style="background:linear-gradient(135deg,#2d2520,#0a0807);"></div>
  <div class="auth__wrap">
    <div class="auth__card">
      <div class="auth__brand"><img src="../shared/main-logo.png" style="height:68px;width:auto"/></div>
      
      <h2 class="auth__title">Reset your password</h2>
      <p style="text-align:center;color:var(--ink-500);margin:0 0 24px;font-size:13.5px">Enter the email registered with your PartsHub account. We'll send you a 6-digit verification code.</p>
      <form onsubmit="event.preventDefault(); window.location='reset-password-otp.html';">
        <div class="field"><input type="email" placeholder="Registered email address*" required value=""/></div>
        <label class="checkrow mb-16" style="color:var(--ink-500);font-size:12.5px"><input type="checkbox" class="cbx"/> &nbsp;I'd prefer to receive the code via SMS to my registered mobile</label>
        <button class="btn btn--primary btn--block btn--lg">Send verification code</button>
        <div class="auth__signup">Remembered? <a class="auth__link" href="login.html">Back to login</a></div>
        <div style="margin-top:18px;padding:12px;background:var(--bodyBg);border-radius:4px;font-size:12px;color:var(--ink-500);text-align:left">
          <strong>Trouble accessing your account?</strong> If your email is no longer active, contact your platform admin or write to <a class="auth__link" href="javascript:alert('Email: support@partshub.ae')">support@partshub.ae</a>.
        </div>
      </form>
  
    </div>
  </div>
</div></body></html>
