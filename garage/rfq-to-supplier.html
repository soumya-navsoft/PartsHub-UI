<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Garage — RFQ To Supplier</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="garage" data-page="claim-request" data-subpage="rfq-to-supplier" data-page-title="RFQ To Supplier">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="page-card">
        <div class="page-card__toolbar">
          <div class="search"><span id="si"></span><input placeholder="Search RFQ ID, part, supplier..." /></div>
          <div style="margin-left:auto" class="flex gap-8">
            <button class="btn"><span id="fi"></span> Filter</button>
            <a class="btn btn--primary" href="rfq-to-supplier-create.html"><span id="pi"></span> Send New RFQ</a>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="rfqTable">
            <thead>
              <tr>
                <th class="check"><input type="checkbox" class="cbx"/></th>
                <th>RFQ ID</th>
                <th>Claim ID</th>
                <th>Parts</th>
                <th>Suppliers</th>
                <th>Responses</th>
                <th>Status</th>
                <th>Created</th>
                <th>Expires</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>13</option></select></div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  document.getElementById('fi').innerHTML = PHIcon('filter', 14);
  document.getElementById('pi').innerHTML = PHIcon('plus', 14);

  const rows = [
    ['EFHG1234U','JKLMN56780','Shock absorbers, Brake pad set','5','3','Open','badge--ok'],
    ['EFHG1235V','JKLMN56781','Transmission rebuild kit','3','1','Open','badge--ok'],
    ['EFHG1236W','JKLMN56782','Headlamp LH, Battery','4','4','Closed','badge--info'],
    ['EFHG1237X','JKLMN56783','Radiator hose, Front axle','6','2','Open','badge--ok'],
    ['EFHG1238Y','JKLMN56784','Alternator OEM','2','0','Awaiting','badge--warn'],
    ['EFHG1239Z','JKLMN56785','Brake calipers, Brake discs','5','5','Closed','badge--info'],
    ['EFHG1240A','JKLMN56786','Coolant, Oil filter','3','2','Open','badge--ok'],
    ['EFHG1241B','JKLMN56787','Timing belt kit','4','1','Open','badge--ok'],
    ['EFHG1242C','JKLMN56788','Suspension arm LH','3','3','Closed','badge--info'],
    ['EFHG1243D','JKLMN56789','Side mirror RH','5','2','Open','badge--ok'],
    ['EFHG1244E','JKLMN56790','Exhaust manifold','2','0','Awaiting','badge--warn'],
    ['EFHG1245F','JKLMN56791','Spark plug set','4','4','Cancelled','badge--danger'],
    ['EFHG1246G','JKLMN56792','Fuel pump assembly','3','1','Open','badge--ok']
  ];
  document.querySelector('#rfqTable tbody').innerHTML = rows.map(r => {
    const statusKey = r[5].toLowerCase();
    const href = `rfq-to-supplier-detail.html?rfq=${encodeURIComponent(r[0])}&claim=${encodeURIComponent(r[1])}&status=${statusKey}`;
    return `
    <tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><a class="id-link" href="${href}">${r[0]}</a></td>
      <td>${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td><strong>${r[4]}</strong> / ${r[3]}</td>
      <td><span class="badge ${r[6]}">${r[5]}</span></td>
      <td>20/01/2025</td>
      <td>27/01/2025</td>
      <td class="more">${PHIcon('dot3', 18)}</td>
    </tr>`;
  }).join('');
</script>
</body>
</html>
