<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Insurance — Policy Holders</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
</head>
<body data-portal="insurance" data-page="policy-holders" data-page-title="Policy Holders">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="page-card">
        <div class="page-card__toolbar">
          <div class="search"><span id="si"></span><input placeholder="Search policy holders..."/></div>
          <div style="margin-left:auto" class="flex gap-8">
            <button class="btn">Export</button>
            <button class="btn btn--primary"><span id="pi"></span> Add Policy Holder</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data" id="t">
            <thead>
              <tr>
                <th class="check"><input type="checkbox" class="cbx"/></th>
                <th>Holder</th>
                <th>Policy Number</th>
                <th>Vehicle(s)</th>
                <th>Plan</th>
                <th>Premium / yr</th>
                <th>Claims</th>
                <th>Status</th>
                <th>Renewal</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager">
          <div class="pager__show">Show <select><option>10</option></select> of 12,847</div>
          <div class="pager__nav">
            <button class="pager__btn">‹</button>
            <button class="pager__btn is-active">1</button>
            <button class="pager__btn">2</button>
            <button class="pager__btn">3</button>
            <button class="pager__btn">…</button>
            <button class="pager__btn">›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('si').innerHTML = PHIcon('search', 14);
  document.getElementById('pi').innerHTML = PHIcon('plus', 14);
  const NAMES = ['Sulaiman Al-Zayoudi','Yasmeen Al-Ghafli','Omar Al-Mansouri','Aisha Al-Hashimi','Mohammed Al-Falasi','Fatima Al-Suwaidi','Khalid Al-Nuaimi','Mariam Al-Maktoum','Hassan Al-Hammadi','Layla Al-Khouri'];
  const PLANS = [['Comprehensive','badge--info'],['Third Party','badge'],['Premium','badge--ok'],['Comprehensive','badge--info']];
  let html='';
  for (let i=0;i<10;i++) {
    const p = PLANS[i%PLANS.length];
    html+=`<tr>
      <td><input type="checkbox" class="cbx"/></td>
      <td><span class="avatar-sm"></span><strong>${NAMES[i]}</strong></td>
      <td>89KLMN6${789+i}P1Q2R3</td>
      <td>${i%3===0 ? '2 vehicles' : '1 vehicle'}</td>
      <td><span class="badge ${p[1]}">${p[0]}</span></td>
      <td><strong>AED ${(2400 + i*340).toLocaleString()}</strong></td>
      <td>${i%4}</td>
      <td><span class="badge badge--ok">Active</span></td>
      <td>${(10+i).toString().padStart(2,'0')}/03/2026</td>
      <td class="more">${PHIcon('dot3',18)}</td>
    </tr>`;
  }
  document.querySelector('#t tbody').innerHTML = html;
</script>
</body>
</html>
