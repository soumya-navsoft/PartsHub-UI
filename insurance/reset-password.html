<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>PartsHub Insurance — New Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/styles.css"/></head>
<body>
<div class="auth">
  <div class="auth__bg" style="background:linear-gradient(135deg,#0e1729,#0a0f1c);"></div>
  <div class="auth__wrap">
    <div class="auth__card">
      <div class="auth__brand"><img src="../shared/main-logo.png" style="height:68px;width:auto"/></div>
      
      <h2 class="auth__title">Choose a new password</h2>
      <p style="text-align:center;color:var(--ink-500);margin:0 0 24px;font-size:13.5px">Your new password must meet our security policy.</p>
      <form onsubmit="event.preventDefault(); document.getElementById('done').style.display='block'; setTimeout(()=>window.location='login.html', 2500);">
        <div class="field"><input type="password" placeholder="New password*" required minlength="8" id="pw"/></div>
        <div class="field"><input type="password" placeholder="Confirm new password*" required/></div>
        <div style="background:var(--bodyBg);padding:12px;border-radius:4px;font-size:12px;color:var(--ink-500);margin-bottom:16px">
          <strong>Password must contain:</strong>
          <ul style="margin:6px 0 0 18px;padding:0;line-height:1.6">
            <li>At least 8 characters</li>
            <li>One uppercase letter (A-Z)</li>
            <li>One number (0-9)</li>
            <li>One special character (! @ # $ % …)</li>
          </ul>
        </div>
        <button class="btn btn--primary btn--block btn--lg">Update password</button>
        <div id="done" style="display:none;background:var(--ok-bg);color:var(--ok-fg);padding:14px;border-radius:4px;margin-top:16px;font-size:13px;text-align:center">
          ✓ Password updated. Redirecting to login…
        </div>
        <div class="auth__signup">Remembered? <a class="auth__link" href="login.html">Back to login</a></div>
      </form>
  
    </div>
  </div>
</div></body></html>
