<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub — Insurance Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
<style>
  .auth__bg.ins {
    background:
      radial-gradient(ellipse at 60% 40%, rgba(225,29,42,0.18), transparent 60%),
      linear-gradient(135deg, #0e1729 0%, #1b2540 60%, #0a0f1c 100%);
  }
  .city-art { position:absolute; left:0; right:0; bottom:0; height:55%; z-index:1; opacity:0.85; }
</style>
</head>
<body>
<div class="auth">
  <div class="auth__bg ins"></div>
  <svg class="city-art" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMax slice">
    <defs>
      <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#0e1729" stop-opacity="0"/>
        <stop offset="100%" stop-color="#0a0f1c"/>
      </linearGradient>
      <pattern id="windows" width="14" height="20" patternUnits="userSpaceOnUse">
        <rect width="14" height="20" fill="transparent"/>
        <rect x="3" y="3" width="3" height="6" fill="#FFD27A" opacity="0.7"/>
        <rect x="9" y="3" width="3" height="6" fill="#FFE3A8" opacity="0.4"/>
        <rect x="3" y="12" width="3" height="6" fill="#FFD27A" opacity="0.5"/>
        <rect x="9" y="12" width="3" height="6" fill="#FFE3A8" opacity="0.3"/>
      </pattern>
    </defs>
    <!-- city skyline silhouettes -->
    <g fill="#1c2540">
      <rect x="0" y="280" width="120" height="220"/>
      <rect x="120" y="200" width="80" height="300"/>
      <rect x="220" y="240" width="100" height="260"/>
      <rect x="340" y="120" width="60" height="380"/>
      <rect x="420" y="180" width="120" height="320"/>
      <rect x="560" y="80" width="50" height="420"/>
      <rect x="630" y="160" width="100" height="340"/>
      <rect x="750" y="220" width="80" height="280"/>
      <rect x="850" y="140" width="110" height="360"/>
      <rect x="980" y="200" width="70" height="300"/>
      <rect x="1070" y="260" width="130" height="240"/>
    </g>
    <rect x="0" y="280" width="1200" height="220" fill="url(#windows)"/>
    <!-- foreground -->
    <rect x="0" y="450" width="1200" height="50" fill="#070a14"/>
  </svg>

  <div class="auth__wrap">
    <div class="auth__card">
      <div class="auth__brand"><img src="../shared/main-logo.png" style="width:100px;height:auto"/></div>
      <h2 class="auth__title">Log in as Insurance</h2>
      <form onsubmit="event.preventDefault(); window.location='dashboard.html';">
        <div class="field"><input type="email" placeholder="Email Address*" required /></div>
        <div class="field field--icon"><input type="password" placeholder="Password*" required /><span class="toggle-eye" id="eye"></span></div>
        <div class="row-between">
          <label class="checkrow"><input type="checkbox" class="cbx"/> Remember me</label>
          <a class="auth__link" href="forgot-password.html">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn--primary btn--block btn--lg">Log In</button>
        <div class="auth__signup">New to Parts Hub? <a class="auth__link" href="register.html">Create account</a></div>
      </form>
    </div>
  </div>
</div>
<script src="../shared/icons.js"></script>
<script>document.getElementById('eye').innerHTML = PHIcon('eyeOff', 18);</script>
</body>
</html>
