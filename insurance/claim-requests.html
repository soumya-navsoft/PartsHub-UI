<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PartsHub Insurance — Claim Requests</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/styles.css" />
<style>
  .claim-page {
    background: var(--bg-common);
    border-radius: 8px;
    border: 1px solid var(--auth-box-border);
    padding: 22px 24px;
  }
  .claim-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    justify-content: flex-end;
  }
  .claim-toolbar .search-box {
    width: 280px;
    height: 40px;
    border: 1px solid var(--form-field-border);
    border-radius: 4px;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    color: var(--ink-400);
  }
  .claim-toolbar .search-box input {
    border: 0; outline: 0; background: transparent;
    flex: 1; font-size: 14px; color: var(--bodyText);
    font-family: inherit;
  }
  .claim-toolbar .ic-btn {
    width: 40px; height: 40px;
    border-radius: 4px;
    border: 1px solid var(--form-field-border);
    background: #fff;
    display: grid; place-items: center;
    color: var(--forgot-link-color);
    cursor: pointer;
  }
  .claim-toolbar .ic-btn:hover { background: var(--bodyBg); }
  .claim-add {
    height: 40px;
    background: var(--brand-red);
    color: #fff;
    border: 0;
    border-radius: 4px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .claim-add:hover { background: var(--brand-red-dark); }
  .claim-total {
    font-size: 13.5px;
    color: var(--bodyText);
    margin-bottom: 12px;
  }
  .claim-total strong { font-weight: 500; }

  table.claim-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 14px;
  }
  table.claim-table thead th {
    text-align: left;
    font-weight: 500;
    color: var(--ink-500);
    padding: 12px 14px;
    background: var(--bg-common);
    border-bottom: 1px solid var(--grid-field-border);
    white-space: nowrap;
    font-size: 13.5px;
  }
  table.claim-table tbody td {
    padding: 16px 14px;
    border-bottom: 1px solid var(--grid-field-border);
    vertical-align: middle;
    color: var(--bodyText);
    background: #fff;
  }
  table.claim-table tbody tr:hover td {
    background: var(--active-row-color);
  }
  table.claim-table .cl-id {
    color: var(--brand-red);
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
  }
  table.claim-table .cl-id:hover { text-decoration: underline; }
  table.claim-table .cl-status {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12.5px;
    font-weight: 400;
  }
  table.claim-table .cl-status.draft { background: #fff4dc; color: #8a5a00; }
  table.claim-table .cl-status.scheduled { background: #e8f5ee; color: var(--green-txt); }
  table.claim-table .cl-status.awaiting { background: #e8f5ee; color: var(--green-txt); }
  table.claim-table .cl-status.submitted { background: #e8f5ee; color: var(--green-txt); }
  table.claim-table .cl-status.quoted { background: #e3eefc; color: var(--forgot-link-color); }
  table.claim-table .cl-more {
    color: var(--ink-400);
    cursor: pointer;
    font-size: 18px;
    letter-spacing: 2px;
  }
  table.claim-table .cl-sl {
    color: var(--bodyText);
    font-variant-numeric: tabular-nums;
  }
  .claim-footer {
    display: flex;
    align-items: center;
    margin-top: 16px;
    gap: 12px;
  }
  .claim-show {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--ink-500);
    font-size: 13px;
  }
  .claim-show select {
    border: 1px solid var(--form-field-border);
    padding: 6px 28px 6px 12px;
    border-radius: 4px;
    background: #fff;
    font-family: inherit;
    font-size: 13px;
    color: var(--bodyText);
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236b6b6b' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    min-width: 60px;
  }
  .claim-show-divider { color: var(--ink-300); }
  .claim-pagination {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pg-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--form-field-border);
    border-radius: 4px;
    background: #fff;
    display: grid; place-items: center;
    color: var(--ink-500);
    font-size: 14px;
    cursor: pointer;
  }
  .pg-btn:hover { background: var(--bodyBg); }
  .pg-btn.is-active {
    background: var(--brand-red);
    color: #fff;
    border-color: var(--brand-red);
  }
  .pg-btn:disabled {
    color: var(--ink-300);
    cursor: not-allowed;
  }
</style>
</head>
<body data-portal="insurance" data-page="claims" data-subpage="claim-requests" data-page-title="Claim Requests">
<div class="app">
  <div id="shell-sidebar"></div>
  <main>
    <div id="shell-topbar"></div>
    <div class="page">
      <div class="claim-toolbar">
        <div class="search-box">
          <span id="searchIcon"></span>
          <input placeholder="Search..." />
        </div>
        <button class="ic-btn" id="dlBtn" title="Download"></button>
        <button class="ic-btn" id="statsBtn" title="Stats"></button>
        <button class="ic-btn" id="filterBtn" title="Filter"></button>
        <a class="claim-add" href="claim-create.html"><span id="plusIcon"></span> Add Claim</a>
      </div>

      <div class="claim-page">
        <div class="claim-total">Total <strong>10</strong> claims found</div>

        <table class="claim-table" id="claimsTable">
          <thead>
            <tr>
              <th>SL No.</th>
              <th>Claim ID</th>
              <th>Policy Number</th>
              <th>Policy Holder Name</th>
              <th>Status</th>
              <th>Damage Level</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <div class="claim-footer">
          <div class="claim-show">
            Show
            <span class="claim-show-divider">|</span>
            <select><option>50</option><option>25</option><option>10</option></select>
          </div>
          <div class="claim-pagination">
            <button class="pg-btn" disabled>‹</button>
            <button class="pg-btn is-active">1</button>
            <button class="pg-btn" disabled>›</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../shared/icons.js"></script>
<script src="../shared/sidebar.js"></script>
<script>
  document.getElementById('searchIcon').innerHTML = PHIcon('search', 16);
  document.getElementById('dlBtn').innerHTML = PHIcon('download', 18);
  document.getElementById('statsBtn').innerHTML = PHIcon('bars', 18);
  document.getElementById('filterBtn').innerHTML = PHIcon('filter', 18);
  document.getElementById('plusIcon').innerHTML = PHIcon('plus', 14);

  // Data matching the screenshot
  const ROWS = [
    [1,  'CLM00330', '3526423653',     'Sam',                       'Draft',                    'draft',     'Severe'],
    [2,  'CLM00329', 'wweew',          'wews',                      'Draft',                    'draft',     'Moderate'],
    [3,  'CLM00328', 'TEst123',        'Testname',                  'Inspection Scheduled',     'scheduled', 'Moderate'],
    [4,  'CLM00320', 'KUTREY3267324872','Biswanath Debendran Kutrya','Awaiting Garage Response','awaiting',  'Moderate'],
    [5,  'CLM00317', '32942384039840938','Ramaknata',               'Submitted',                'submitted', 'Severe'],
    [6,  'CLM00314', '768823783278',   'Tret',                      'Inspection Scheduled',     'scheduled', 'Severe'],
    [7,  'CLM00313', '3423432432424',  'Srisa',                     'Inspection Scheduled',     'scheduled', 'Minor'],
    [8,  'CLM00312', 'PL12345678',     'Soumya Roy',                'Awaiting Garage Response', 'awaiting',  'Moderate'],
    [9,  'CLM00311', '2387423478394',  'RetroName',                 'Submitted',                'submitted', 'Minor'],
    [10, 'CLM00310', '2378483274932482390', 'Vin Diesel',           'Submitted',                'submitted', 'Total Loss']
  ];

  document.querySelector('#claimsTable tbody').innerHTML = ROWS.map(r => `
    <tr>
      <td class="cl-sl">${r[0]}</td>
      <td><a class="cl-id" href="claim-detail.html">${r[1]}</a></td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td><span class="cl-status ${r[5]}">${r[4]}</span></td>
      <td>${r[6]}</td>
      <td class="cl-more">⋯</td>
    </tr>
  `).join('');
</script>
</body>
</html>
